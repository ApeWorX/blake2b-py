name: Test

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"

      - name: Run Ruff Lint
        run: uv run --group lint ruff check .

      - name: Run Ruff Format
        run: uv run --group lint ruff format --check .

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Run Rust Tests
        env:
          PYO3_PYTHON: python
        run: cargo test test_

  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build Python Extension
        run: uv run --group test maturin develop

      - name: Run Python Tests
        run: uv run --group test pytest

  test-rust-eip-152-vector-8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Run Slow EIP-152 Vector
        env:
          PYO3_PYTHON: python
        run: cargo test --release test_f_eip_152_vec_8 -- --ignored --nocapture

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Setup Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Run Rust Benchmarks
        env:
          PYO3_PYTHON: python
        run: cargo +nightly bench --features nightly-benches
